<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL shortener</title>
</head>
<body>
    <h1>URL Shortener</h1>
    <form action="{{ url_for('index') }}" method="post">
        <input type="url" name="long_url" placeholder="Enter the long URL" required="required">
        <button type="submit">Shorten</button>
    </form>
</body>
</html>
